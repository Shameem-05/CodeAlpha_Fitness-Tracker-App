<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainFit Tracker - Firebase Edition</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #4257b2;
      --primary-hover: #3b4c9b;
      --bg: #f6f7fb;
      --text: #1a1c23;
      --light-text: #4a5268;
      --card-bg: #ffffff;
      --border: #dcdfe3;
      --shadow: 0 8px 24px rgba(0,0,0,0.12);
      --success: #10b981;
      --calories: #ff6b6b;
      --steps: #4dadf7;
      --minutes: #cc5de8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    body { 
      background-color: var(--bg); 
      color: var(--text); 
      padding: 2rem 1.5rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
    }
    
    .app-container { 
      width: 100%; 
      max-width: 650px; 
      display: flex; 
      flex-direction: column; 
      gap: 1.5rem; 
      margin: auto; 
    }

    header { 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      gap: 0.3rem;
    }
    
    h1 { 
      color: var(--primary); 
      font-size: 2.2rem; 
      font-weight: 800; 
    }

    .db-status {
      font-size: 0.85rem;
      font-weight: 800;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      background: #eef0f6;
      color: var(--light-text);
    }

    /* Dashboard Summary Cards Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    @media (max-width: 550px) { .dashboard-grid { grid-template-columns: 1fr; } }

    .metric-card {
      background: var(--card-bg);
      border: 3px solid var(--border);
      border-radius: 24px; 
      padding: 1.2rem;
      text-align: center;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .metric-title { font-weight: 800; font-size: 0.95rem; color: var(--light-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-weight: 800; font-size: 1.6rem; color: var(--text); }
    .metric-goal { font-weight: 700; font-size: 0.85rem; color: var(--light-text); }

    /* Custom Curvy Progress Bars */
    .progress-track {
      width: 100%;
      height: 12px;
      background: #eef0f6;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.5s ease-out;
    }

    /* Weekly Progress Chart Box */
    .chart-box {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 1.5rem;
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chart-box h3 { font-size: 1.2rem; font-weight: 800; }
    .bar-chart {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      height: 150px;
      padding-top: 1rem;
      gap: 0.5rem;
    }
    .chart-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      height: 100%;
      justify-content: flex-end;
    }
    .chart-bar {
      width: 100%;
      max-width: 35px;
      background: var(--primary);
      border-radius: 12px 12px 0 0; 
      min-height: 5px;
      transition: height 0.5s ease;
    }
    .chart-label { font-size: 0.8rem; font-weight: 800; color: var(--light-text); }

    /* Form Panel */
    .form-panel { 
      background: var(--card-bg); 
      border-radius: 24px; 
      padding: 1.5rem; 
      box-shadow: var(--shadow); 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      border: 3px solid var(--border); 
    }
    .form-panel h3 { font-size: 1.2rem; color: var(--text); font-weight: 800; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    
    input.form-input, select.form-input { 
      width: 100%; 
      padding: 0.9rem; 
      border: 2.5px solid var(--border); 
      border-radius: 16px; 
      font-size: 0.95rem; 
      font-weight: 700; 
      color: var(--text);
      outline: none; 
    }
    input.form-input:focus, select.form-input:focus { border-color: var(--primary); }
    .form-actions { display: flex; justify-content: flex-end; gap: 0.5rem; }

    /* History Log List View */
    .history-box {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .history-box h3 { font-size: 1.2rem; font-weight: 800; margin-left: 0.5rem; }
    .log-item {
      background: var(--card-bg);
      border: 3px solid var(--border);
      border-radius: 20px;
      padding: 1rem 1.2rem;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-info { display: flex; flex-direction: column; gap: 0.2rem; }
    .log-title { font-weight: 800; font-size: 1.1rem; color: var(--text); }
    .log-sub { font-weight: 700; font-size: 0.9rem; color: var(--light-text); }
    .log-actions { display: flex; gap: 0.5rem; }

    /* Curvy Bold Buttons */
    button { 
      padding: 0.8rem 1.6rem; 
      border: none; 
      border-radius: 50px; 
      font-weight: 800; 
      font-size: 0.95rem; 
      cursor: pointer; 
      transition: all 0.2s; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center;
      gap: 0.5rem; 
      background: #eef0f6; 
      color: var(--text); 
    }
    button:hover { background: #e2e5f0; transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: #ffebeb; color: #df2020; border: 2px solid #ffd1d1; }
    .btn-danger:hover { background: #ffd1d1; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }

    /* Toast Notification */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1c23; color: white; padding: 0.8rem 1.8rem; border-radius: 30px; font-size: 0.95rem; font-weight: 800; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.3); pointer-events: none; z-index: 10; opacity: 0; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>BrainFit Tracker</h1>
      <div class="db-status" id="status-badge">Checking connection Status...</div>
    </header>

    <div class="dashboard-grid">
      <div class="metric-card">
        <span class="metric-title">Calories Burned</span>
        <span class="metric-value" id="total-calories">0 kcal</span>
        <span class="metric-goal">Goal: 2000</span>
        <div class="progress-track"><div class="progress-fill" id="fill-calories" style="background: var(--calories)"></div></div>
      </div>
      <div class="metric-card">
        <span class="metric-title">Daily Steps</span>
        <span class="metric-value" id="total-steps">0</span>
        <span class="metric-goal">Goal: 10000</span>
        <div class="progress-track"><div class="progress-fill" id="fill-steps" style="background: var(--steps)"></div></div>
      </div>
      <div class="metric-card">
        <span class="metric-title">Workout Time</span>
        <span class="metric-value" id="total-minutes">0 min</span>
        <span class="metric-goal">Goal: 60</span>
        <div class="progress-track"><div class="progress-fill" id="fill-minutes" style="background: var(--minutes)"></div></div>
      </div>
    </div>

    <div class="chart-box">
      <h3>Weekly Calorie Burn Summary</h3>
      <div class="bar-chart" id="weekly-chart"></div>
    </div>

    <div class="form-panel">
      <h3 id="form-heading">Log Fitness Activity</h3>
      <div class="form-grid">
        <select id="input-type" class="form-input">
          <option value="Running">🏃‍♂️ Running</option>
          <option value="Walking">🚶‍♂️ Walking</option>
          <option value="Cycling">🚴‍♂️ Cycling</option>
          <option value="Gym Workout">🏋️‍♂️ Gym Workout</option>
          <option value="Swimming">🏊‍♂️ Swimming</option>
          <option value="Other">✨ Other Exercise</option>
        </select>
        <input type="number" id="input-duration" class="form-input" placeholder="Duration (minutes)" min="1">
        <input type="number" id="input-calories" class="form-input" placeholder="Calories Burned" min="1">
        <input type="number" id="input-steps" class="form-input" placeholder="Steps (optional)" min="0">
      </div>
      <div class="form-actions">
        <button id="cancel-btn" style="display: none;" onclick="clearForm()">Cancel Edit</button>
        <button class="btn-primary" onclick="saveLog()">Save Activity</button>
      </div>
    </div>

    <div class="history-box">
      <h3>Activity Logs</h3>
      <div id="history-list" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
    </div>
  </div>

  <div class="toast" id="toast-msg">Status Message</div>

  <script>
    // --- STEP 1: FIREBASE CONFIGURATION ---
    // Paste your real credentials here from the Firebase Console.
    const firebaseConfig = {
      apiKey: "AIzaSyDyVWFrBug6JqqcZ8CYpaRz7jr4ndP09xI",
      authDomain: "brainfit-tracker.firebaseapp.com",
      projectId: "brainfit-tracker",
      storageBucket: "brainfit-tracker.firebasestorage.app",
      messagingSenderId: "28913323365",
      appId: "1:28913323365:web:d264bb3585335dcb5e658c",
      measurementId: "G-EJJBVX9BPH"
    };

    // Goals Configuration Setup
    const goals = { calories: 2000, steps: 10000, minutes: 60 };
    
    // Initial Fallback Mock Local Data (Used if Firebase keys are not added yet)
    const localDefaults = [
      { id: "mock-1", type: "Running", duration: 30, calories: 350, steps: 4500, date: "Today", timestamp: Date.now() },
      { id: "mock-2", type: "Gym Workout", duration: 45, calories: 400, steps: 0, date: "Today", timestamp: Date.now() - 1000 },
      { id: "mock-3", type: "Walking", duration: 20, calories: 120, steps: 2500, date: "Yesterday", timestamp: Date.now() - 86400000 }
    ];

    // Core Global States
    let fitnessLogs = [];
    let editTargetId = null;
    let db = null;
    let useFirebase = false;

    // DOM References
    const statusBadge = document.getElementById('status-badge');
    const totalCalories = document.getElementById('total-calories');
    const totalSteps = document.getElementById('total-steps');
    const totalMinutes = document.getElementById('total-minutes');
    const fillCalories = document.getElementById('fill-calories');
    const fillSteps = document.getElementById('fill-steps');
    const fillMinutes = document.getElementById('fill-minutes');
    
    const inputType = document.getElementById('input-type');
    const inputDuration = document.getElementById('input-duration');
    const inputCalories = document.getElementById('input-calories');
    const inputSteps = document.getElementById('input-steps');
    const formHeading = document.getElementById('form-heading');
    const cancelBtn = document.getElementById('cancel-btn');
    const historyList = document.getElementById('history-list');
    const weeklyChart = document.getElementById('weekly-chart');
    const toastMsg = document.getElementById('toast-msg');

    // --- STEP 2: INITIALIZATION & BACKEND SYNC ---
    initBackend();

    function initBackend() {
      // Check if credentials have been replaced
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        try {
          firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();
          useFirebase = true;
          statusBadge.textContent = "☁️ Connected to Cloud Firebase";
          statusBadge.style.background = "#e6fcf5";
          statusBadge.style.color = "#0ca678";
          
          // Realtime Real-time synchronization stream loop setup
          db.collection("fitness_logs").orderBy("timestamp", "desc")
            .onSnapshot((snapshot) => {
              fitnessLogs = [];
              snapshot.forEach((doc) => {
                fitnessLogs.push({ id: doc.id, ...doc.data() });
              });
              updateAppView();
            }, (error) => {
              console.error("Firebase read sync error: ", error);
              showToast("⚠️ Cloud stream disconnected. Checking Local Data.");
              switchToLocalFallback();
            });

        } catch (e) {
          console.error("Firebase initialization failed:", e);
          switchToLocalFallback();
        }
      } else {
        switchToLocalFallback();
      }
    }

    function switchToLocalFallback() {
      useFirebase = false;
      statusBadge.textContent = "💾 Running via Browser Local Storage";
      statusBadge.style.background = "#fff9db";
      statusBadge.style.color = "#f59f00";
      fitnessLogs = JSON.parse(localStorage.getItem('brainfit_logs')) || localDefaults;
      updateAppView();
    }

    function updateAppView() {
      renderDashboard();
      renderHistory();
      renderChart();
    }

    function renderDashboard() {
      const todayLogs = fitnessLogs.filter(log => log.date === "Today");
      let sumCal = 0, sumSteps = 0, sumMin = 0;

      todayLogs.forEach(log => {
        sumCal += parseInt(log.calories) || 0;
        sumSteps += parseInt(log.steps) || 0;
        sumMin += parseInt(log.duration) || 0;
      });

      totalCalories.textContent = `${sumCal} kcal`;
      totalSteps.textContent = sumSteps.toLocaleString();
      totalMinutes.textContent = `${sumMin} min`;

      fillCalories.style.width = `${Math.min((sumCal / goals.calories) * 100, 100)}%`;
      fillSteps.style.width = `${Math.min((sumSteps / goals.steps) * 100, 100)}%`;
      fillMinutes.style.width = `${Math.min((sumMin / goals.minutes) * 100, 100)}%`;
    }

    function renderHistory() {
      historyList.innerHTML = "";
      if (fitnessLogs.length === 0) {
        historyList.innerHTML = `<p style="text-align:center; font-weight:800; color:var(--light-text); padding:1rem;">No activities logged yet.</p>`;
        return;
      }

      fitnessLogs.forEach(log => {
        const stepDisplay = log.steps > 0 ? ` • 🦶 ${log.steps} steps` : '';
        const itemHtml = `
          <div class="log-item">
            <div class="log-info">
              <span class="log-title">${log.type}</span>
              <span class="log-sub">⏱️ ${log.duration} mins • 🔥 ${log.calories} kcal${stepDisplay} (${log.date})</span>
            </div>
            <div class="log-actions">
              <button class="btn-sm" onclick="startEdit('${log.id}')">✏️ Edit Log</button>
              <button class="btn-danger btn-sm" onclick="deleteLog('${log.id}')">🗑️ Delete Log</button>
            </div>
          </div>
        `;
        historyList.insertAdjacentHTML('beforeend', itemHtml);
      });
    }

    function renderChart() {
      weeklyChart.innerHTML = "";
      const dayGroups = { "Mon": 400, "Tue": 700, "Wed": 250, "Thu": 600, "Fri": 0, "Sat": 850, "Sun": 300 };
      
      let todayCal = 0;
      fitnessLogs.forEach(l => { if(l.date === "Today") todayCal += parseInt(l.calories) || 0; });
      dayGroups["Fri"] = todayCal; 

      const maxVal = Math.max(...Object.values(dayGroups), 1200);

      Object.keys(dayGroups).forEach(day => {
        const cal = dayGroups[day];
        const pct = (cal / maxVal) * 100;
        const columnHtml = `
          <div class="chart-column">
            <span style="font-size:0.75rem; font-weight:800; color:var(--primary);">${cal > 0 ? cal : ''}</span>
            <div class="chart-bar" style="height: ${pct}%; ${day === 'Fri' ? 'background:var(--calories);' : ''}"></div>
            <span class="chart-label">${day}</span>
          </div>
        `;
        weeklyChart.insertAdjacentHTML('beforeend', columnHtml);
      });
    }

    // --- STEP 3: CRUD HANDLERS (FIREBASE INTERACTION) ---
    function saveLog() {
      const typeVal = inputType.value;
      const durVal = parseInt(inputDuration.value);
      const calVal = parseInt(inputCalories.value);
      const stepVal = parseInt(inputSteps.value) || 0;

      if (!durVal || !calVal || durVal <= 0 || calVal <= 0) {
        showToast("⚠️ Please enter a valid duration and calorie amount!");
        return;
      }

      const logData = {
        type: typeVal,
        duration: durVal,
        calories: calVal,
        steps: stepVal,
        date: "Today",
        timestamp: Date.now()
      };

      if (useFirebase) {
        // Firebase Cloud Save/Update Block
        if (editTargetId !== null) {
          db.collection("fitness_logs").doc(editTargetId).update(logData)
            .then(() => showToast("✏️ Log synced up to Firebase!"))
            .catch(e => showToast("⚠️ Error updating cloud database."));
        } else {
          db.collection("fitness_logs").add(logData)
            .then(() => showToast("✅ Log saved safely to Cloud Firebase!"))
            .catch(e => showToast("⚠️ Cloud transaction failed."));
        }
      } else {
        // LocalStorage Fallback Block
        if (editTargetId !== null) {
          const idx = fitnessLogs.findIndex(l => l.id === editTargetId);
          if (idx !== -1) fitnessLogs[idx] = { id: editTargetId, ...logData };
          showToast("✏️ Activity log updated locally!");
        } else {
          fitnessLogs.unshift({ id: Date.now().toString(), ...logData });
          showToast("✅ Activity logged successfully!");
        }
        saveToLocalStorage();
        updateAppView();
      }

      clearForm();
    }

    function startEdit(id) {
      const target = fitnessLogs.find(l => l.id === id);
      if (!target) return;

      editTargetId = id;
      formHeading.textContent = `Modify Logged Activity`;
      inputType.value = target.type;
      inputDuration.value = target.duration;
      inputCalories.value = target.calories;
      inputSteps.value = target.steps || "";
      
      cancelBtn.style.display = "inline-block";
      inputDuration.focus();
    }

    function deleteLog(id) {
      if (!confirm("Are you sure you want to permanently delete this fitness log?")) return;

      if (useFirebase) {
        db.collection("fitness_logs").doc(id).delete()
          .then(() => showToast("🗑️ Activity completely wiped from Firebase."))
          .catch(e => showToast("⚠️ Could not drop document record."));
      } else {
        fitnessLogs = fitnessLogs.filter(l => l.id !== id);
        showToast("🗑️ Activity record dropped locally.");
        saveToLocalStorage();
        updateAppView();
      }
      clearForm();
    }

    function saveToLocalStorage() {
      localStorage.setItem('brainfit_logs', JSON.stringify(fitnessLogs));
    }

    function clearForm() {
      editTargetId = null;
      formHeading.textContent = "Log Fitness Activity";
      inputDuration.value = "";
      inputCalories.value = "";
      inputSteps.value = "";
      cancelBtn.style.display = "none";
    }

    function showToast(message) {
      toastMsg.textContent = message;
      toastMsg.classList.add('show');
      setTimeout(() => { toastMsg.classList.remove('show'); }, 2500);
    }
  </script>
</body>
</html>
